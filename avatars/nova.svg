<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Deep space background gradient -->
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1035"/>
      <stop offset="50%" stop-color="#0d0a1f"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>
    
    <!-- Star core gradient -->
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="20%" stop-color="#fff8e7"/>
      <stop offset="50%" stop-color="#ffd97d"/>
      <stop offset="80%" stop-color="#ff9d3d"/>
      <stop offset="100%" stop-color="#ff6b1a"/>
    </radialGradient>
    
    <!-- Outer glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd97d" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#ff9d3d" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff6b1a" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Soft halo -->
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8d5ff" stop-opacity="0"/>
      <stop offset="70%" stop-color="#a78bfa" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Star beam filter -->
    <filter id="starGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Soft glow filter -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Sparkle filter -->
    <filter id="sparkle">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)"/>
  
  <!-- Background stars (scattered) -->
  <g fill="#ffffff" opacity="0.6">
    <circle cx="45" cy="30" r="1"/>
    <circle cx="120" cy="80" r="0.8"/>
    <circle cx="300" cy="50" r="1.2"/>
    <circle cx="350" cy="120" r="0.7"/>
    <circle cx="80" cy="180" r="0.9"/>
    <circle cx="320" cy="200" r="1"/>
    <circle cx="60" cy="280" r="0.8"/>
    <circle cx="340" cy="300" r="1.1"/>
    <circle cx="150" cy="350" r="0.7"/>
    <circle cx="250" cy="370" r="0.9"/>
    <circle cx="370" cy="250" r="0.6"/>
    <circle cx="30" cy="150" r="1"/>
    <circle cx="380" cy="40" r="0.8"/>
    <circle cx="200" cy="20" r="0.7"/>
    <circle cx="280" cy="380" r="0.5"/>
  </g>
  
  <!-- Distant constellation lines (subtle) -->
  <g stroke="#a78bfa" stroke-width="0.5" opacity="0.2">
    <line x1="45" y1="30" x2="120" y2="80"/>
    <line x1="120" y1="80" x2="200" y2="200"/>
    <line x1="300" y1="50" x2="200" y2="200"/>
    <line x1="350" y1="120" x2="300" y2="50"/>
    <line x1="320" y1="200" x2="200" y2="200"/>
  </g>
  
  <!-- Soft outer halo -->
  <circle cx="200" cy="200" r="160" fill="url(#halo)"/>
  
  <!-- Outer glow ring -->
  <circle cx="200" cy="200" r="110" fill="url(#glow)" filter="url(#softGlow)"/>
  
  <!-- Secondary glow layer -->
  <circle cx="200" cy="200" r="80" fill="#ffd97d" opacity="0.08"/>
  
  <!-- Main star core -->
  <circle cx="200" cy="200" r="50" fill="url(#core)" filter="url(#starGlow)"/>
  
  <!-- Star burst rays (Nova = new/ exploding star) -->
  <g stroke="#fff8e7" opacity="0.7" stroke-linecap="round">
    <!-- Main 8 rays -->
    <line x1="200" y1="130" x2="200" y2="90" stroke-width="2"/>
    <line x1="200" y1="270" x2="200" y2="310" stroke-width="2"/>
    <line x1="130" y1="200" x2="90" y2="200" stroke-width="2"/>
    <line x1="270" y1="200" x2="310" y2="200" stroke-width="2"/>
    
    <!-- Diagonal rays (shorter) -->
    <line x1="150" y1="150" x2="125" y2="125" stroke-width="1.5"/>
    <line x1="250" y1="150" x2="275" y2="125" stroke-width="1.5"/>
    <line x1="150" y1="250" x2="125" y2="275" stroke-width="1.5"/>
    <line x1="250" y1="250" x2="275" y2="275" stroke-width="1.5"/>
    
    <!-- Secondary rays (tiny) -->
    <line x1="200" y1="140" x2="200" y2="115" stroke-width="1" opacity="0.5"/>
    <line x1="200" y1="260" x2="200" y2="285" stroke-width="1" opacity="0.5"/>
    <line x1="140" y1="200" x2="115" y2="200" stroke-width="1" opacity="0.5"/>
    <line x1="260" y1="200" x2="285" y2="200" stroke-width="1" opacity="0.5"/>
  </g>
  
  <!-- Sparkle points on rays -->
  <g fill="#ffffff" filter="url(#sparkle)">
    <circle cx="200" cy="90" r="3"/>
    <circle cx="200" cy="310" r="2.5"/>
    <circle cx="90" cy="200" r="2.5"/>
    <circle cx="310" cy="200" r="3"/>
    <circle cx="125" cy="125" r="2"/>
    <circle cx="275" cy="125" r="2"/>
    <circle cx="125" cy="275" r="2"/>
    <circle cx="275" cy="275" r="2"/>
  </g>
  
  <!-- Inner star highlight -->
  <circle cx="200" cy="200" r="30" fill="#ffffff" opacity="0.15"/>
  
  <!-- Subtle orbiting particle ring -->
  <g fill="#ffd97d" opacity="0.4">
    <circle cx="200" cy="85" r="2">
      <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="20s" repeatCount="indefinite"/>
    </circle>
    <circle cx="315" cy="200" r="1.5">
      <animateTransform attributeName="transform" type="rotate" from="90 200 200" to="450 200 200" dur="20s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="315" r="2">
      <animateTransform attributeName="transform" type="rotate" from="180 200 200" to="540 200 200" dur="20s" repeatCount="indefinite"/>
    </circle>
    <circle cx="85" cy="200" r="1.5">
      <animateTransform attributeName="transform" type="rotate" from="270 200 200" to="630 200 200" dur="20s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Small accent stars -->
  <g fill="#e8d5ff">
    <polygon points="70,60 72,65 77,66 73,70 74,75 70,72 66,75 67,70 63,66 68,65" transform="scale(0.6) translate(50,30)"/>
    <polygon points="70,60 72,65 77,66 73,70 74,75 70,72 66,75 67,70 63,66 68,65" transform="scale(0.5) translate(600,100)"/>
    <polygon points="70,60 72,65 77,66 73,70 74,75 70,72 66,75 67,70 63,66 68,65" transform="scale(0.4) translate(800,500)"/>
  </g>
  
  <!-- Tiny sparkle cross accents -->
  <g stroke="#ffffff" stroke-width="0.8" opacity="0.7">
    <line x1="330" y1="160" x2="345" y2="160"/>
    <line x1="337" y1="153" x2="337" y2="168"/>
    
    <line x1="55" y1="320" x2="70" y2="320"/>
    <line x1="62" y1="313" x2="62" y2="328"/>
  </g>
</svg>
